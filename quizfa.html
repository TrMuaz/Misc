let answeredCount = 0;
let score = 0;
const quizDiv = document.getElementById("quiz");
const scoreBox = document.getElementById("scoreBox");

questions.forEach((q, index) => {
  const qDiv = document.createElement("div");
  qDiv.className = "question";
  qDiv.innerHTML = `
    <h3>${q.text}</h3>
    <div class="options">
      ${q.options.map((opt, i) => `
        <label>
          <input type="radio" name="q${index}" value="${i}">
          (${String.fromCharCode(65+i)}) ${opt}
        </label>
      `).join("")}
    </div>
    <button class="check">检查答案</button>
    <div class="result"></div>
  `;
  quizDiv.appendChild(qDiv);

  const button = qDiv.querySelector("button.check");
  const resultDiv = qDiv.querySelector(".result");

  let done = false;

  button.addEventListener("click", () => {
    if (done) return;
    const selected = qDiv.querySelector("input[type=radio]:checked");
    if (!selected) {
      alert("请先选择一个答案。");
      return;
    }
    const val = parseInt(selected.value, 10);
    done = true;
    answeredCount++;

    if (val === q.correct) {
      score++;
      resultDiv.textContent = "正确！做得很好。";
      resultDiv.className = "result correct";
    } else {
      resultDiv.innerHTML = "回答错误。正确答案是 "
        + String.fromCharCode(65 + q.correct) + "："
        + q.options[q.correct] + "。<br><br>解释：" + q.explanation;
      resultDiv.className = "result incorrect";
    }
    scoreBox.textContent = `已完成：${answeredCount} / ${questions.length} 题，得分：${score} 分`;
  });
});
